<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compartir Aplicación</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root {
            --primary-color: #2c3e50;
            --whatsapp-color: #25d366;
            --bg-color: #f4f6f7;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-color);
            color: var(--primary-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .share-card {
            background: white;
            max-width: 400px;
            width: 100%;
            border-radius: 16px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 10px;
            font-weight: 700;
        }

        p {
            font-size: 0.95rem;
            color: #7f8c8d;
            margin-bottom: 25px;
            line-height: 1.4;
        }

        /* Contenedor del QR que ya tienes */
        .qr-container {
            margin: 20px auto 30px auto;
            width: 200px;
            height: 200px;
            background: #eee; /* Fondo de respaldo */
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid #e2e8f0;
        }

        .qr-container img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* Botón de WhatsApp */
        .btn-whatsapp {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background-color: var(--whatsapp-color);
            color: white;
            border: none;
            padding: 15px 20px;
            border-radius: 30px;
            font-size: 1.1rem;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(37, 211, 102, 0.3);
            transition: transform 0.2s;
        }

        .btn-whatsapp:active {
            transform: scale(0.98);
        }

        /* Botón de regreso */
        .btn-back {
            display: inline-block;
            margin-top: 25px;
            color: #7f8c8d;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div class="share-card">
        <h1>Compartir Palabra del Día</h1>
        <p>Escanea el código QR desde otro celular o presiona el botón de abajo para enviarlo directamente por WhatsApp.</p>

        <!-- Tu código QR ya existente (asumiendo que lo guardas como qr.png en la misma carpeta share) -->
        <div class="qr-container">
            <img src="qr.png" alt="Código QR para compartir">
        </div>

        <!-- Botón dinámico de WhatsApp -->
        <a id="whatsappShareBtn" href="#" target="_blank" class="btn-whatsapp">
            <i class="fab fa-whatsapp" style="font-size: 1.4rem;"></i>
            Compartir por WhatsApp
        </a>

        <!-- Regresar usando la navegación del navegador o el enlace -->
        <a href="../index.html" class="btn-back">
            <i class="fas fa-arrow-left"></i> Volver al Inicio
        </a>
    </div>

    <script>
    // Tu URL base real de GitHub Pages (puedes escribirla directo si quieres asegurar)
    // Pero este método limpia la ruta 'share/share.html' de forma exacta:
    const currentUrl = window.location.href;
    const siteUrl = currentUrl.replace('share/share.html', '');
    
    // El mensaje que se enviará
    const text = "¡Hola! Te invito a seguir las lecturas y el estudio bíblico diario desde esta aplicación web: ";
    const shareMessage = encodeURIComponent(text + siteUrl);
    
    // Usamos el enlace universal de WhatsApp que funciona tanto en PC como en móviles
    document.getElementById('whatsappShareBtn').href = `https://wa.me/?text=${shareMessage}`;
</script>

</body>
</html>
